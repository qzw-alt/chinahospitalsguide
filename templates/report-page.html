<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} | China Hospitals Guide</title>
<meta name="description" content="{{DESCRIPTION}}">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f4f7fc;
    color: #1f2937;
    line-height: 1.7;
  }
  .report-header {
    background: linear-gradient(135deg, #13294b 0%, #1e4b7a 50%, #2a6b9e 100%);
    padding: 64px 24px 48px;
    color: white;
    text-align: center;
  }
  .report-header h1 { font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 700; margin-bottom: 8px; }
  .report-header .subtitle { color: rgba(255,255,255,0.78); font-size: 0.95rem; }
  .report-header .customer-meta {
    margin-top: 20px;
    display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;
    font-size: 0.88rem; color: rgba(255,255,255,0.7);
  }
  .report-header .customer-meta span { background: rgba(255,255,255,0.1); padding: 4px 14px; border-radius: 999px; }
  .badge-premium {
    display: inline-block;
    background: #f59e0b; color: #1f2937;
    padding: 4px 16px; border-radius: 999px;
    font-size: 0.75rem; font-weight: 700; letter-spacing: 0.04em;
    margin-bottom: 16px;
  }
  .report-body > h2,
  .report-body > .section-card,
  .report-body > h2,
  .report-body > h3,
  .report-body > blockquote,
  .report-body > table,
  .report-body > ul,
  .report-body > p,
  .report-body > hr,
  .report-body > h4,
  .report-body > h1 {
    max-width: 820px;
    margin-left: auto;
    margin-right: auto;
  }
  .report-body > h2,
  .report-body > h3,
  .report-body > blockquote,
  .report-body > table,
  .report-body > ul,
  .report-body > p,
  .report-body > hr,
  .report-body > h4,
  .report-body > h5 {
    background: white;
    border-radius: 18px;
    padding: 32px 28px;
    margin-bottom: 20px;
    box-shadow: 0 4px 16px rgba(15,23,42,0.06);
    border: 1px solid rgba(30,60,114,0.07);
  }
  .section-card h2 {
    font-size: 1.2rem;
    color: #1e3c72;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid #eef2f7;
  }
  .section-card h3 {
    font-size: 1.05rem;
    color: #2a5298;
    margin: 20px 0 10px;
  }
  .section-card p { margin-bottom: 12px; color: #4b5563; }
  .section-card ul { padding-left: 20px; margin-bottom: 12px; }
  .section-card li { margin-bottom: 6px; color: #4b5563; }
  .section-card table {
    width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 0.92rem;
  }
  .section-card th, .section-card td {
    padding: 10px 12px; border: 1px solid #e5eaf1; text-align: left;
  }
  .section-card th { background: #f8faff; font-weight: 600; color: #1e3c72; }
  .section-card blockquote {
    border-left: 3px solid #2a6b9e;
    padding: 12px 16px;
    margin: 12px 0;
    background: #f8faff;
    border-radius: 0 8px 8px 0;
    color: #4b5563;
    font-style: italic;
  }
  .section-card hr { border: none; border-top: 1px solid #eef2f7; margin: 20px 0; }
  .section-card strong { color: #1f2937; }
  .hospital-card {
    background: #f8faff;
    border-radius: 14px;
    padding: 24px;
    margin: 16px 0;
    border: 1px solid #e0e8f2;
  }
  .hospital-card h3 { margin-top: 0; }
  .hospital-card .one-liner {
    color: #6b7280;
    font-style: italic;
    margin-bottom: 12px;
    padding-left: 12px;
    border-left: 3px solid #2a6b9e;
  }
  .info-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 6px 16px;
    font-size: 0.9rem;
  }
  .info-grid .label { color: #6b7280; white-space: nowrap; }
  .info-grid .value { color: #1f2937; }
  .toolbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid #e5eaf1;
    padding: 10px 20px;
    display: flex; justify-content: flex-end; gap: 10px;
  }
  .toolbar button {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid #d1d9e6;
    background: white;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    color: #1e3c72;
    transition: all 0.2s;
  }
  .toolbar button:hover { background: #1e3c72; color: white; border-color: #1e3c72; }
  .toolbar .btn-primary { background: #1e3c72; color: white; border-color: #1e3c72; }
  .toolbar .btn-primary:hover { background: #13294b; }
  .section-card .action-steps {
    counter-reset: step;
    list-style: none;
    padding: 0;
  }
  .section-card .action-steps li {
    counter-increment: step;
    padding: 14px 16px 14px 52px;
    border-left: 3px solid #d1d9e6;
    margin-bottom: 0;
    position: relative;
  }
  .section-card .action-steps li::before {
    content: counter(step);
    position: absolute; left: 12px; top: 12px;
    width: 28px; height: 28px;
    background: #1e3c72;
    color: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 700;
  }
  .section-card .action-steps li:last-child { border-color: transparent; }
  .badge-included {
    display: inline-block;
    background: #d1fae5; color: #065f46;
    padding: 2px 10px; border-radius: 4px;
    font-size: 0.75rem; font-weight: 600;
  }
  .badge-extra {
    display: inline-block;
    background: #fef3c7; color: #92400e;
    padding: 2px 10px; border-radius: 4px;
    font-size: 0.75rem; font-weight: 600;
  }
  .footnote {
    text-align: center;
    color: #9ca3af;
    font-size: 0.8rem;
    padding: 24px 0 40px;
  }
  @media (max-width: 640px) {
    .report-header { padding: 48px 16px 36px; }
    .section-card { padding: 24px 18px; border-radius: 14px; }
    .info-grid { grid-template-columns: 1fr; gap: 2px; }
    .toolbar { justify-content: center; }
  }
</style>
</head>
<body>
  <div class="toolbar" id="toolbar">
    <button onclick="window.print()">🖨️ Print / PDF</button>
    <button class="btn-primary" onclick="downloadTxt()">📥 Download Plain Text</button>
  </div>

  <div class="report-header">
    <div class="badge-premium">{{BADGE}}</div>
    <h1>{{TITLE}}</h1>
    <p class="subtitle">{{SUBTITLE}}</p>
    <div class="customer-meta">
      <span>👤 {{CUSTOMER_NAME}}</span>
      <span>📋 {{CASE_INFO}}</span>
      <span>📅 {{DATE}}</span>
    </div>
  </div>

  <div class="report-body" id="reportContent">
    {{CONTENT}}
  </div>

  <div class="footnote">
    <p>Generated by China Hospitals Guide — chinahospitalsguide.com</p>
  </div>

  <script>
    function downloadTxt() {
      // Extract all text content from the page
      var content = document.getElementById('reportContent');
      var text = extractText(content);
      var blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = '{{DOWNLOAD_FILENAME}}';
      a.click();
      URL.revokeObjectURL(url);
    }

    function extractText(el) {
      var clone = el.cloneNode(true);
      // Remove decorative elements
      clone.querySelectorAll('.badge-included, .badge-extra, .toolbar').forEach(function(e) { e.remove(); });
      return clone.textContent
        .replace(/\\s+/g, ' ')
        .replace(/\\n\\s*\\n/g, '\\n\\n')
        .replace(/•/g, '\\n•')
        .replace(/(\\S[。！？])\\s*/g, '$1\\n')
        .trim()
        .split('\\n')
        .map(function(l) { return l.trim(); })
        .filter(function(l) { return l.length > 0; })
        .join('\\n\\n');
    }
  </script>
</body>
</html>
